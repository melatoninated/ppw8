<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulir Pendaftaran Mahasiswa Baru</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f5efe6 0%, #dce8f2 100%);
      font-family: Georgia, "Times New Roman", serif;
    }

    .form-card {
      max-width: 900px;
      border: 0;
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(31, 41, 55, 0.12);
      overflow: hidden;
    }

    .form-header {
      background: linear-gradient(120deg, #1f4e5f 0%, #3c6e71 100%);
      color: #fff;
    }

    .btn-simpan {
      background-color: #1f4e5f;
      border-color: #1f4e5f;
      color: #fff;
    }

    .btn-simpan:hover {
      background-color: #173845;
      border-color: #173845;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="card form-card mx-auto">
      <div class="form-header p-4 p-md-5">
        <h1 class="h3 mb-2">Formulir Pendaftaran Mahasiswa Baru</h1>
        <p class="mb-0">
          Lengkapi data berikut untuk proses pendaftaran awal.
        </p>
      </div>

      <div class="card-body p-4 p-md-5">
        <div class="alert alert-success alert-dismissible fade d-none" id="successAlert" role="alert">
          Data pendaftaran berhasil disimpan.
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form id="registrationForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="namaLengkap" class="form-label">Nama Lengkap</label>
              <input
                type="text"
                class="form-control is-valid"
                id="namaLengkap"
                placeholder="Masukkan nama lengkap"
                value="Budi Santoso"
              />
              <div class="valid-feedback">Nama lengkap sudah terisi.</div>
            </div>

            <div class="col-md-6">
              <label for="nim" class="form-label">NIM</label>
              <input
                type="text"
                class="form-control is-invalid"
                id="nim"
                placeholder="Contoh: 2310112345"
              />
              <div class="invalid-feedback">NIM wajib diisi dengan format yang benar.</div>
            </div>

            <div class="col-12">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="nama@email.com"
              />
            </div>

            <div class="col-md-6">
              <label for="prodi" class="form-label">Program Studi</label>
              <select class="form-select" id="prodi">
                <option selected disabled>Pilih program studi</option>
                <option>Teknik Informatika</option>
                <option>Sistem Informasi</option>
                <option>Manajemen</option>
                <option>Akuntansi</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="semester" class="form-label">Semester</label>
              <select class="form-select" id="semester">
                <option selected disabled>Pilih semester</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
              </select>
            </div>

            <div class="col-12">
              <label for="alamat" class="form-label">Alamat</label>
              <textarea
                class="form-control"
                id="alamat"
                rows="4"
                placeholder="Tuliskan alamat lengkap"
              ></textarea>
            </div>

            <div class="col-12">
              <label for="fotoProfil" class="form-label">Foto Profil</label>
              <input class="form-control" type="file" id="fotoProfil" />
            </div>

            <div class="col-12">
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-simpan">Simpan</button>
                <button type="reset" class="btn btn-outline-secondary">Reset</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
  <script>
    const form = document.getElementById("registrationForm");
    const successAlert = document.getElementById("successAlert");

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      successAlert.classList.remove("d-none");
      successAlert.classList.add("show");
    });

    form.addEventListener("reset", function () {
      successAlert.classList.add("d-none");
      successAlert.classList.remove("show");
    });
  </script>
</body>
</html>
